<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentication Redirect</title>
  </head>
  <body>
    <p>Processing authentication...</p>
    <script>
      // MSAL redirect flow では acquireTokenRedirect() を呼び出したのと同じ PCA インスタンスが
      // handleRedirectPromise() を処理する必要がある。このページで新しい PCA を生成して
      // handleRedirectPromise() を呼ぶと、セッションストレージに保存されたインタラクション状態を
      // 別インスタンスが参照できず noTokenRequestCacheError が発生する。
      //
      // そのため URL フラグメント（auth code を含む）をそのままメインアプリへ引き継ぎ、
      // メインアプリの initMsal() 内の handleRedirectPromise() で処理させる。
      // initMsal() は acquireTokenRedirect() を呼び出したのと同じ設定で PCA を生成し、
      // sessionStorage の REQUEST_PARAMS / INTERACTION_STATUS を正しく参照できる。
      window.location.replace('/' + window.location.search + window.location.hash)
    </script>
  </body>
</html>
