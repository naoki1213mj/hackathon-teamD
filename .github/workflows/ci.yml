name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: pytest
        run: uv run python -m pytest tests/ -v --ignore=tests/test_fabric_data_agent_integration.py

      - name: pytest (Fabric integration, opt-in)
        # Runs only when secrets are configured. Falls back to skip otherwise.
        env:
          FABRIC_DATA_AGENT_URL_V2: ${{ vars.FABRIC_DATA_AGENT_URL_V2 }}
          AZURE_CLIENT_ID: ${{ secrets.FABRIC_TEST_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.FABRIC_TEST_AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
        if: ${{ vars.FABRIC_DATA_AGENT_URL_V2 != '' && secrets.FABRIC_TEST_AZURE_CLIENT_SECRET != '' }}
        run: uv run python -m pytest tests/test_fabric_data_agent_integration.py -v
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Frontend lint
        run: cd frontend && npm run lint

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

      - name: Frontend build
        run: cd frontend && npm run build
